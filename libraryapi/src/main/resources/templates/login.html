<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .login-card{
            width:100%;
            max-width:400px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }
    </style>

</head>
<body>

<div class="card login-card p-4">

    <div class="text-center mb-4">
        <h3 class="fw-bold">Login</h3>
        <p class="text-muted">Acesse sua conta</p>
    </div>

    <form method="post" th:action="@{/login}" >

        <div class="mb-3">
            <label class="form-label">Usuário</label>
            <input type="text" id=username name=username class="form-control" placeholder="Digite seu usuário">
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" id=password name=password class="form-control" placeholder="Digite sua senha">
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input">
            <label class="form-check-label">Lembrar-me</label>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Entrar
        </button>

    </form>

</div>

</body>
</html>
